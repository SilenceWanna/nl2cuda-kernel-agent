# .aider.conf.yml -- aider defaults (Stage 7: zero-config autonomous loop; portable, NOT tied to any model/proxy)
# aider auto-loads this at repo root. With CONVENTIONS.md, the user only needs to type an algorithm definition.
#
# This file holds only portable "skill behavior". Model / proxy are machine-specific and NOT here:
#   - Model & proxy: pass `aider --model <your-model>` at launch and set env OPENAI_API_BASE / OPENAI_API_KEY
#     to your own OpenAI-compatible endpoint. (Author env example: model=openai/GPT-5.5-joybuilder,
#     OPENAI_API_BASE=http://127.0.0.1:8787/v1. Change per machine/proxy; do not hardcode here.)
#   - Model-specific settings (e.g. disable temperature) go in the local, gitignored .aider.model.settings.yml.
#
# Portable skill behavior (tracked):
# - auto-test + test-cmd: after each edit, auto-run remote A100 verify+bench; autotest.sh detects the
#   current case and passes through --strict exit code (PASS=0 stop / else nonzero -> aider keeps fixing).
# - read: load conventions/methodology/self-test spec as read-only context at startup.

yes-always: true
auto-commits: true
auto-test: true
test-cmd: "bash skill/scripts/autotest.sh"
# custom proxy model names are unknown to aider -> suppress the warning page (portable)
show-model-warnings: false
check-model-accepts-settings: false
analytics: false

read:
  - CONVENTIONS.md
  - skill/SKILL.md
  - skill/AUTONOMOUS_LOOP.md
  - skill/loop.md
