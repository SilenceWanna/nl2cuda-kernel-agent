# .aider.conf.yml — aider 默认配置（阶段7：零配置全自主，**通用/不绑定具体模型或代理**）
# aider 在仓库根自动加载本文件。配合 CONVENTIONS.md，用户只需在 aider 界面输入算法定义即可。
#
# 本文件只放"skill 行为"（对任何人通用）；不含 model / 代理地址（那是机器相关，见下）。
#
# 【机器相关，由用户自己给，不进仓库】：
#   - 模型与代理：启动时用 `aider --model <你的模型>`，并设环境变量 OPENAI_API_BASE / OPENAI_API_KEY
#     指向你自己的 OpenAI 兼容端点。（作者环境示例：model=openai/GPT-5.5-joybuilder，
#     OPENAI_API_BASE=http://127.0.0.1:8787/v1；换机器/代理时相应改，勿写死进本文件。）
#   - 若某模型需禁 temperature 等特殊设置，放本地不提交的 .aider.model.settings.yml（已 gitignore）。
#
# 【通用 skill 行为，进仓库】：
# - auto-test + test-cmd：每次改完自动跑远程 A100 verify+bench；autotest.sh 自动探测当前在做的 case、
#   透传 --strict 退出码（PASS=0 aider 停 / 否则非0 aider 读输出继续修）→ --auto-test 全自主闭环。
# - read：启动即把约定/方法论/自测规范加入只读上下文，agent 无需用户手动喂。

yes-always: true
auto-commits: true
auto-test: true
test-cmd: "bash skill/scripts/autotest.sh"

# 启动即加载（只读）：约定 + skill 方法论 + 自主闭环规范
read:
  - CONVENTIONS.md
  - skill/SKILL.md
  - skill/AUTONOMOUS_LOOP.md
  - skill/loop.md
